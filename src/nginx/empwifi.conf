# Public employee WiFi page. Served unauthenticated at /wifi/ (the backend emp_* RPC
# methods enforce the employee password/token). Assets are referenced relative to /wifi/.
location = /wifi {
    return 302 /wifi/;
}

location ^~ /wifi/ {
    alias /usr/share/empwifi/www/;
    index index.html;
    default_type text/html;
}
